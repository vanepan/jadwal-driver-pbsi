<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Unified Scoring Harness</title>
  <style>
    /* Minimal platform design tokens so the scoped dashboard styles resolve. */
    :root{
      --surface:#fff;--surface-2:#f5f6f8;--border:#e3e6ea;--text:#1d2433;--muted:#6b7280;
      --ok:#1a8a4a;--ok-bg:#e7f6ee;--info:#1565c0;--info-bg:#e8f1fb;--warn:#b26a00;--warn-bg:#fff4e3;
      --danger:#c62828;--danger-bg:#fdeaea;--accent:#1565c0;--on-accent:#fff;--shadow-sm:0 1px 2px rgba(0,0,0,.06);
    }
    body{margin:0;padding:16px;font-family:system-ui,sans-serif;background:var(--surface);}
  </style>
</head>
<body>
<div id="host"></div>
<script type="module">
  import {
    clampScore, normalizeScore, invertScore, scoreBand, scoreLabel,
    scoreColor, capacityScore, confidenceFromScore,
  } from '../js/services/unified-scoring.js';
  import { computeDispatchAnalyticsModel } from '../js/analytics/dispatch-analytics-engine.js';
  import { injectDispatchAnalyticsStyles, renderDispatchAnalyticsDashboard } from '../js/components/dispatch-analytics-dashboard.js';

  window.__scoreColor = scoreColor;
  window.__scoreBand = scoreBand;
  window.__capacityScore = capacityScore;
  window.__invertScore = invertScore;
  window.__normalizeScore = normalizeScore;
  window.__confidenceFromScore = confidenceFromScore;

  window.__renderDispatch = (input) => {
    injectDispatchAnalyticsStyles();
    const model = computeDispatchAnalyticsModel(input);
    document.getElementById('host').innerHTML = renderDispatchAnalyticsDashboard(model, { trendWindow: '30d' });
    return true;
  };
  window.__ready = true;
</script>
</body>
</html>
