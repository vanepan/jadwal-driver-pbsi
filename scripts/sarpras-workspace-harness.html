<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Sarpras Intelligence Workspace Harness</title>
</head>
<body>
<!-- Mounts the real outer shell (sarpras-intelligence-center.js) and, via
     its own dynamic imports, each of the four nested workspaces (NOR
     Center, Archive Center, Knowledge Center, Learning Dashboard) into a
     detached host div — mirrors organizational-memory-harness.html's
     pattern, but exercises actual DOM mounting/rendering instead of just
     engine calls, since these are presentation-layer files. -->
<div id="host" style="display:none;"></div>
<script type="module">
  import {
    mountSarprasIntelligence, setSarprasIntelligenceScreen, closeSarprasIntelligence,
  } from '../js/v2/ui/sarpras-intelligence-center.js';
  // Phase 2.5 — test affordance: create a real Draft KnowledgeItem through
  // the SAME facade + canonical mapping a live import uses, so a DOM test
  // can verify the event-driven dashboard re-render (Part 3/7) in a real
  // browser without needing the File/Firebase upload path.
  import { create as knowledgeCreate } from '../js/v2/knowledge/repository/knowledge-repository.js';
  import { buildManualFileKnowledgeItem } from '../js/v2/knowledge/connectors/manual-file-connector.js';

  const host = document.getElementById('host');
  window.__mount = () => mountSarprasIntelligence(host);
  window.__setScreen = (id) => setSarprasIntelligenceScreen(id);
  window.__close = () => closeSarprasIntelligence();
  window.__hostText = () => host.textContent;
  window.__hostHTML = () => host.innerHTML;
  window.__createKnowledgeItem = (sessionRef) => knowledgeCreate(buildManualFileKnowledgeItem({
    importSessionId: sessionRef, domainType: 'nor', kind: 'document_fact', parsedContent: { value: `seed-${sessionRef}` },
  })).ok;
  window.__ready = true;
</script>
</body>
</html>
