<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Sarpras Intelligence Workspace Harness</title>
</head>
<body>
<!-- Mounts the real outer shell (sarpras-intelligence-center.js) and, via
     its own dynamic imports, each of the four nested workspaces (NOR
     Center, Archive Center, Knowledge Center, Learning Dashboard) into a
     detached host div — mirrors organizational-memory-harness.html's
     pattern, but exercises actual DOM mounting/rendering instead of just
     engine calls, since these are presentation-layer files. -->
<div id="host" style="display:none;"></div>
<script type="module">
  import {
    mountSarprasIntelligence, setSarprasIntelligenceScreen, closeSarprasIntelligence,
  } from '../js/v2/ui/sarpras-intelligence-center.js';
  // Phase 2.5 — test affordance: create a real Draft KnowledgeItem through
  // the SAME facade + canonical mapping a live import uses, so a DOM test
  // can verify the event-driven dashboard re-render (Part 3/7) in a real
  // browser without needing the File/Firebase upload path.
  import { create as knowledgeCreate } from '../js/v2/knowledge/repository/knowledge-repository.js';
  import { buildManualFileKnowledgeItem } from '../js/v2/knowledge/connectors/manual-file-connector.js';
  // Sprint 11.1, Workstream 2 — test affordance: seeds the SAME minimal
  // real Approved structural+pattern Knowledge nor-composition-check.mjs's
  // own seedApproved() fixture uses (Node-side), so a real-browser test can
  // drive the CREATE_NOR conversation all the way to a real composed
  // ComposerDocument, not just the early turns.
  import { ingest, promoteKnowledge } from '../js/v2/knowledge/services/knowledge-service.js';
  import { generateKnowledgeId } from '../js/v2/knowledge/contracts/identity-contract.js';
  // Autonomous Experience (Part 10) — test affordance: records a real
  // Learning Event through the actual, live producer path (the SAME
  // recordCorrection() dataset-import-center.js's Advanced Metadata save
  // calls), so a DOM test can verify the Learning Dashboard's "Hari Ini"
  // card reflects REAL recorded facts, not just render without throwing.
  import { recordCorrection, CORRECTION_TYPE } from '../js/v2/learning/services/learning-service.js';
  // Sprint 11 UAT gap-closure — test affordance: records a real reviewer
  // inline edit through the SAME recordSectionEdit() path onFocusOut uses,
  // so a DOM test can verify the Learning Dashboard reflects an edit made
  // while the reviewer was on ANOTHER screen (Finding 2a re-render-on-reshow).
  import { recordSectionEdit } from '../js/v2/document-intelligence/composer/section-learning-bridge.js';
  // Sprint 11.9 (Persistent Organizational Learning) — test affordances:
  // drive a real reviewer edit through the real composer-store (which fires
  // the composer change listener the app registers, projecting persistent
  // Candidate learning), and read the persistent Candidate queue back.
  import { createDocument as __createDoc, editSection as __editSection } from '../js/v2/document-intelligence/composer/composer-store.js';
  import { rehydrateLearningFromDocuments as __rehydrateLearning } from '../js/v2/document-intelligence/composer/reviewer-edit-rehydration-engine.js';
  import { getCandidateQueue as __getCandidateQueue } from '../js/v2/knowledge/review/review-queue-engine.js';
  import { getKnowledge as __getKnowledge, submitKnowledgeForReview as __submitForReview, promoteKnowledge as __promote } from '../js/v2/knowledge/services/knowledge-service.js';
  // Phase 7 (Runtime Hardening, Part 9) — stress-test affordance: seeds N
  // REAL Import Sessions through the actual engine (createImportSession +
  // attachManualEntryFacts + advanceSession — the exact same calls
  // dataset-import-center.js#processOneFile makes), entirely Firebase-free,
  // so a puppeteer test can measure REAL render cost at scale (25-500
  // sessions) without ever touching Storage/RTDB or a File object.
  import {
    createImportSession, attachManualEntryFacts, listImportSessions,
    submitImportSessionForReview, approveImportSession,
  } from '../js/v2/knowledge/datasets/import-session/import-session-engine.js';
  import { advanceSession, reportUploadStarted } from '../js/v2/knowledge/datasets/import-session/pipeline-scheduler.js';
  import { createBatch } from '../js/v2/knowledge/datasets/import-session/import-batch-engine.js';
  import { DATASET_TYPE } from '../js/v2/knowledge/datasets/contracts/dataset-contract.js';

  const host = document.getElementById('host');
  window.__mount = () => mountSarprasIntelligence(host);
  window.__setScreen = (id) => setSarprasIntelligenceScreen(id);
  window.__close = () => closeSarprasIntelligence();
  window.__hostText = () => host.textContent;
  window.__hostHTML = () => host.innerHTML;
  window.__createKnowledgeItem = (sessionRef) => knowledgeCreate(buildManualFileKnowledgeItem({
    importSessionId: sessionRef, domainType: 'nor', kind: 'document_fact', parsedContent: { value: `seed-${sessionRef}` },
  })).ok;
  window.__recordTestCorrection = (targetKey) => recordCorrection({
    domainType: 'nor', correctionType: CORRECTION_TYPE.METADATA, targetKey,
    actorId: 'test', after: { domainType: 'nor' },
  }).ok;
  window.__recordSectionEditForTest = (documentId, field, before, after) => recordSectionEdit({
    documentId, domainType: 'nor', field, before, after, actorId: 'test',
  }).ok;
  // Sprint 11.9 — persistent organizational learning test affordances.
  window.__createComposerDoc = (fields) => __createDoc('nor', fields).documentId;
  window.__editComposerSection = (id, field, value) => __editSection(id, field, value, 'evan').ok;
  window.__rehydrateLearning = () => __rehydrateLearning();
  window.__candidateQueueIds = () => __getCandidateQueue().map((e) => e.itemId);
  window.__knowledgeItem = (id) => { const r = __getKnowledge(id); return r.ok ? { kind: r.data.kind, state: r.data.lifecycleState, value: r.data.payload.value, originalAiOutput: r.data.payload.originalAiOutput } : null; };
  window.__approveKnowledge = (id) => { __submitForReview(id); return __promote(id, { approverId: 'evan', decidedAt: new Date().toISOString(), preferenceRationale: 'Disetujui untuk pengujian Sprint 11.9.' }).ok; };
  // Sprint 11.1, Workstream 2 — same minimal fixture as nor-composition-
  // check.mjs's Node-side seedApproved(): one structure item + one real
  // sentence_pattern citing {{destination}}/{{traveler}} — the smallest
  // real Approved Knowledge composeApprovedNor() needs to succeed.
  window.__seedNorCompositionKnowledge = () => {
    const now = new Date().toISOString();
    const seed = ({ kind, payload, sourceRef }) => {
      const id = generateKnowledgeId({ domainType: 'nor', sourceType: 'manual-file', sourceRef });
      ingest({
        id, version: 1, domainType: 'nor', sourceType: 'manual-file', kind, payload, confidence: 0.9,
        lifecycleState: 'draft',
        provenance: { connectorId: 'manual-file', sourceRef, capturedAt: now },
        approvedBy: null, approvedAt: null, preferenceRationale: null, createdAt: now, updatedAt: now,
      });
      return promoteKnowledge(id, { approverId: 'evan', decidedAt: now, preferenceRationale: 'seed for nor-center-generate-conversation-check.mjs' }).ok;
    };
    return [
      seed({ kind: 'structure', payload: { signatoryTopCount: 4, signatoryBottomCount: 2, itemCount: 10, reimburseLineCount: 0 }, sourceRef: 'nc-harness-struct-1' }),
      seed({ kind: 'sentence_pattern', payload: { template: 'Sehubungan dengan {{destination}}, kami mengajukan perjalanan dinas untuk {{traveler}}.', slots: [{ name: 'destination' }, { name: 'traveler' }], granularity: 'sentence' }, sourceRef: 'nc-harness-pattern-1' }),
    ].every(Boolean);
  };
  // Experience Architecture phase — the real archiver (dataset-import-
  // center.js#doArchive) is ALREADY registered by the time this script's
  // own top-level code runs: mountSarprasIntelligence's import chain
  // statically imports dataset-import-center.js (for reviewReasons/
  // effectiveStage), and registerArchiver(doArchive) is that file's own
  // module-load side effect (see its header). A fake archiver used to be
  // registered here instead — it satisfied the terminal-state contract
  // (returns a truthy id) but never persisted a real ArchiveRecord, so
  // document-centric-detail-check.mjs's real Archive provenance/
  // relationship assertions had nothing real to read. Removed: no
  // registerArchiver() call here at all now, so the real one wins.
  window.__seedImportSessions = (n, mixArchived = true) => {
    const t0 = performance.now();
    const batch = createBatch({ createdBy: 'stress', domainType: 'nor', totalFiles: n });
    for (let i = 0; i < n; i += 1) {
      const created = createImportSession({
        domainType: 'nor', datasetType: DATASET_TYPE.OFFICIAL, filename: `stress-${i}.pdf`,
        mimeType: 'application/pdf', sizeBytes: 10000 + i, kind: 'pdf', knowledgeKind: 'document_fact',
        uploadedBy: 'stress', batchId: batch.ok ? batch.data.id : null,
      });
      if (!created.ok) continue;
      // A realistic mix: most files get real facts and auto-complete to
      // Archived; every 5th is left evidence-less (a real Awaiting Evidence
      // row) — matching how a real batch actually looks, not a synthetic
      // best case.
      if (mixArchived && i % 5 !== 0) {
        attachManualEntryFacts(created.data.id, { value: `v${i}`, documentNumber: `d${i}`, senderOrigin: 'stress', notes: '' });
      }
      advanceSession(created.data.id);
    }
    const t1 = performance.now();
    return { seedMs: t1 - t0, total: listImportSessions({}).ok ? listImportSessions({}).data.length : -1 };
  };
  // Autonomous Experience (Part 2) — test affordance: leaves sessions
  // genuinely RESTING mid-ladder (never calling advanceSession() to walk
  // them all the way to a terminal), using the real, individual lifecycle
  // primitives — the exact situation a real batch is in while files are
  // still actually uploading/being validated. Distributed evenly across
  // uploading / policy_validation (Building Knowledge bucket reads this
  // stage) / left at classification (Preparing) so all three Progressive
  // Queue buckets have real rows to expand.
  window.__seedInFlightSessions = (n) => {
    const batch = createBatch({ createdBy: 'stress', domainType: 'nor', totalFiles: n });
    for (let i = 0; i < n; i += 1) {
      const created = createImportSession({
        domainType: 'nor', datasetType: DATASET_TYPE.OFFICIAL, filename: `inflight-${i}.pdf`,
        mimeType: 'application/pdf', sizeBytes: 5000, kind: 'pdf', knowledgeKind: 'document_fact',
        uploadedBy: 'stress', batchId: batch.ok ? batch.data.id : null,
      });
      if (!created.ok) continue;
      const id = created.data.id;
      const bucket = i % 3;
      if (bucket === 0) {
        reportUploadStarted(id); // rests at UPLOADING
      } else if (bucket === 1) {
        submitImportSessionForReview(id); // rests at POLICY_VALIDATION ("Building Knowledge")
      }
      // bucket === 2: left at CLASSIFICATION ("Preparing") — no call at all.
    }
    return { total: listImportSessions({}).ok ? listImportSessions({}).data.length : -1 };
  };
  window.__ready = true;
</script>
</body>
</html>
